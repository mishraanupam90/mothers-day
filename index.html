<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Mother's Day ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    position:relative;
}

/* Floating hearts */

.heart{
    position:absolute;
    color:white;
    font-size:20px;
    animation:float 6s linear infinite;
    opacity:0.7;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0.5);
    }
    100%{
        transform:translateY(-120vh) scale(1.4);
    }
}

.container{
    text-align:center;
    z-index:2;
}

h1{
    color:white;
    font-size:3rem;
    margin-bottom:40px;
    text-shadow:2px 2px 10px rgba(0,0,0,0.2);
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:0.2s;
    position:absolute;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

#yesBtn{
    background:#ff4081;
    color:white;
}

#noBtn{
    background:white;
    color:#ff4081;
    left:55%;
    top:55%;
}

.finalMessage{
    display:none;
    color:white;
    text-align:center;
    animation:zoom 1s ease;
}

.finalMessage h2{
    font-size:4rem;
    margin-bottom:20px;
}

.finalMessage p{
    font-size:2rem;
}

@keyframes zoom{
    from{
        transform:scale(0);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.bigHeart{
    font-size:80px;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="container" id="questionBox">
    <h1>Will You Be My Mother Forever? ❤️</h1>

    <button id="yesBtn">Yes ❤️</button>
    <button id="noBtn">No 🙈</button>
</div>

<div class="finalMessage" id="finalMessage">
    <div class="bigHeart">❤️</div>
    <h2>Happy Mother's Day</h2>
    <p>You are the best Mom in the world 🌸</p>
</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const finalMessage = document.getElementById("finalMessage");
const questionBox = document.getElementById("questionBox");

let movable = true;

// Initial button position
yesBtn.style.left = "35%";
yesBtn.style.top = "55%";

// Move yes button everywhere
function moveButton(){

    if(!movable) return;

    const maxX = window.innerWidth - 150;
    const maxY = window.innerHeight - 80;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    yesBtn.style.left = randomX + "px";
    yesBtn.style.top = randomY + "px";
}

// Trigger movement
yesBtn.addEventListener("mouseover", moveButton);
yesBtn.addEventListener("click", moveButton);

// Auto movement every 500ms
const autoMove = setInterval(() => {
    moveButton();
}, 500);

// After 8 sec stop movement
setTimeout(() => {

    movable = false;

    clearInterval(autoMove);

    // Remove no button
    noBtn.style.display = "none";

    // Put yes button center
    yesBtn.style.left = "50%";
    yesBtn.style.top = "60%";
    yesBtn.style.transform = "translate(-50%, -50%)";

}, 8000);

// Final message
yesBtn.addEventListener("click", () => {

    if(!movable){

        questionBox.style.display = "none";
        finalMessage.style.display = "block";
    }
});

// Floating hearts
function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 30 + 15) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
