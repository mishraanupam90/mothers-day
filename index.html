<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Mother's Day</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    h1 {
      color: #fff;
      font-size: 2.5rem;
      margin-bottom: 30px;
    }

    .buttons {
      position: relative;
      width: 300px;
      height: 200px;
      margin: auto;
    }

    button {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
      position: absolute;
    }

    #yesBtn {
      background: #ff4081;
      color: white;
      left: 50px;
      top: 70px;
    }

    #noBtn {
      background: #ffffff;
      color: #ff4081;
      right: 50px;
      top: 70px;
    }

    .message {
      display: none;
      animation: pop 1s ease;
    }

    .message h2 {
      color: white;
      font-size: 3rem;
    }

    .heart {
      font-size: 4rem;
      animation: heartbeat 1s infinite;
    }

    @keyframes pop {
      from {
        transform: scale(0);
      }
      to {
        transform: scale(1);
      }
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.2); }
      50% { transform: scale(1); }
      75% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

  <div class="container" id="questionBox">
    <h1>Will you be my mother forever? ❤️</h1>

    <div class="buttons">
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    </div>
  </div>

  <div class="message" id="messageBox">
    <div class="heart">❤️</div>
    <h2>Happy Mother's Day Mom ❤️</h2>
    <h3>You are the best!</h3>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const questionBox = document.getElementById("questionBox");
    const messageBox = document.getElementById("messageBox");

    let moving = true;

    function moveButton() {
      if (!moving) return;

      const maxX = window.innerWidth - 120;
      const maxY = window.innerHeight - 70;

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      yesBtn.style.left = randomX + "px";
      yesBtn.style.top = randomY + "px";
    }

    yesBtn.addEventListener("mouseover", moveButton);
    yesBtn.addEventListener("click", moveButton);

    // After 8 seconds
    setTimeout(() => {
      noBtn.style.display = "none";
      moving = false;

      yesBtn.style.left = "50%";
      yesBtn.style.top = "70px";
      yesBtn.style.transform = "translateX(-50%)";

    }, 8000);

    yesBtn.addEventListener("click", () => {
      if (!moving) {
        questionBox.style.display = "none";
        messageBox.style.display = "block";
      }
    });
  </script>

</body>
</html>
