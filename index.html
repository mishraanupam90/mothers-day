<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Mother's Day ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffb199);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Background glow */

body::before{
    content:'';
    position:absolute;
    width:700px;
    height:700px;
    background:rgba(255,255,255,0.15);
    border-radius:50%;
    filter:blur(120px);
    animation:pulse 5s infinite alternate;
}

@keyframes pulse{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.25);
    }
}

/* Floating Hearts */

.heart{
    position:absolute;
    color:white;
    opacity:0.75;
    animation:float linear forwards;
}

@keyframes float{
    from{
        transform:translateY(110vh) scale(0.5);
        opacity:0;
    }
    to{
        transform:translateY(-120vh) scale(1.6);
        opacity:1;
    }
}

/* Main Card */

.card{
    width:90%;
    max-width:700px;
    padding:50px;
    border-radius:35px;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(15px);
    box-shadow:0 8px 40px rgba(0,0,0,0.2);
    text-align:center;
    position:relative;
    z-index:10;
    border:1px solid rgba(255,255,255,0.2);
}

h1{
    font-size:3rem;
    color:white;
    margin-bottom:20px;
    text-shadow:2px 2px 10px rgba(0,0,0,0.2);
}

.subtitle{
    color:white;
    font-size:1.2rem;
    margin-bottom:40px;
    opacity:0.9;
}

/* Buttons */

.buttons{
    position:relative;
    height:250px;
}

button{
    position:absolute;
    padding:16px 36px;
    border:none;
    border-radius:50px;
    font-size:1.2rem;
    cursor:pointer;
    transition:0.25s;
    font-weight:bold;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

#yesBtn{
    background:white;
    color:#ff4081;
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    background:#ff4081;
    color:white;
    left:58%;
    top:45%;
}

.timer{
    color:white;
    margin-top:20px;
    font-size:1rem;
    opacity:0.85;
}

/* Final Page */

.final{
    display:none;
    text-align:center;
    color:white;
    animation:zoomIn 1.2s ease;
    z-index:20;
}

.final h2{
    font-size:4rem;
    margin-bottom:20px;
}

.final p{
    font-size:1.5rem;
    margin-bottom:15px;
}

.bigHeart{
    font-size:90px;
    animation:heartbeat 1s infinite;
}

@keyframes heartbeat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

@keyframes zoomIn{
    from{
        transform:scale(0);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

/* Mom Photo */

.momPhoto{
    width:230px;
    height:230px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid white;
    margin-bottom:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    animation:heartbeat 2s infinite;
}

/* From text */

.fromText{
    margin-top:25px;
    font-size:1.3rem;
    color:white;
    line-height:1.8;
}

.fromText span{
    font-size:2rem;
    font-weight:bold;
}

/* Music Button */

.musicBtn{
    position:fixed;
    top:20px;
    right:20px;
    background:white;
    color:#ff4081;
    border:none;
    border-radius:50px;
    padding:12px 22px;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    z-index:1000;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* Confetti */

.confetti{
    position:absolute;
    width:12px;
    height:12px;
    background:white;
    opacity:0.8;
    top:-20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

/* Mobile */

@media(max-width:600px){

    h1{
        font-size:2.2rem;
    }

    .card{
        padding:30px 20px;
    }

    .final h2{
        font-size:2.6rem;
    }

    .final p{
        font-size:1.1rem;
    }

    .momPhoto{
        width:180px;
        height:180px;
    }
}

</style>
</head>

<body>

<!-- Music -->

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="musicBtn" onclick="playMusic()">
    🎵 Play Music
</button>

<!-- Question Card -->

<div class="card" id="questionCard">

    <h1>Will You Be My Mother Forever? ❤️</h1>

    <div class="subtitle">
        A tiny question with a lifetime answer 🌸
    </div>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 🙈</button>
    </div>

    <div class="timer" id="timerText">
        Catch the YES button if you can 😄
    </div>

</div>

<!-- Final Page -->

<div class="final" id="finalPage">

    <img src="mom.jpg" class="momPhoto">

    <div class="bigHeart">❤️</div>

    <h2>Happy Mother's Day</h2>

    <p>
        Thank you for every sacrifice,<br>
        every smile and every hug 🌸
    </p>

    <p>
        You are my first home,<br>
        first teacher and forever superhero ❤️
    </p>

    <div class="fromText">
        With lots of love from <br>
        <span>Advik ❤️</span>
    </div>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const questionCard = document.getElementById("questionCard");
const finalPage = document.getElementById("finalPage");
const timerText = document.getElementById("timerText");

let movable = true;

// Initial positions

yesBtn.style.left = "20%";
yesBtn.style.top = "45%";

// Move button

function moveButton(){

    if(!movable) return;

    const maxX = window.innerWidth - 180;
    const maxY = window.innerHeight - 100;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    yesBtn.style.left = x + "px";
    yesBtn.style.top = y + "px";
}

// Events

yesBtn.addEventListener("mouseenter", moveButton);
yesBtn.addEventListener("click", moveButton);

// Auto move

const autoMove = setInterval(() => {
    moveButton();
}, 400);

// Countdown

let seconds = 8;

const countdown = setInterval(() => {

    seconds--;

    if(seconds > 0){

        timerText.innerHTML =
        "No option disappears in " + seconds + " sec 😄";
    }

},1000);

// Stop moving

setTimeout(() => {

    movable = false;

    clearInterval(autoMove);
    clearInterval(countdown);

    noBtn.style.opacity = "0";

    setTimeout(() => {
        noBtn.style.display = "none";
    },500);

    timerText.innerHTML =
    "Now you can finally click YES ❤️";

    yesBtn.style.left = "50%";
    yesBtn.style.top = "50%";
    yesBtn.style.transform =
    "translate(-50%, -50%) scale(1.15)";

},8000);

// Final celebration

yesBtn.addEventListener("click", () => {

    if(!movable){

        questionCard.style.display = "none";

        finalPage.style.display = "block";

        startConfetti();
    }
});

// Floating hearts

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left =
    Math.random()*100 + "vw";

    heart.style.fontSize =
    (Math.random()*25 + 15) + "px";

    heart.style.animationDuration =
    (Math.random()*4 + 4) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },7000);
}

setInterval(createHeart,250);

// Confetti

function startConfetti(){

    for(let i=0;i<120;i++){

        const confetti =
        document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left =
        Math.random()*100 + "vw";

        confetti.style.animationDuration =
        (Math.random()*3 + 2) + "s";

        confetti.style.opacity =
        Math.random();

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },5000);
    }
}

// Music

function playMusic(){

    const music =
    document.getElementById("bgMusic");

    music.play();
}

</script>

</body>
</html>
